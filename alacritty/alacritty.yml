live_config_reload: true

window:
  opacity: 1
  padding:
    x: 8
    y: 0
  dynamic_padding: false
  decorations: full  #buttonless, full or none

font:
  size: 12.0
  normal:
    family: PlemolJP35 Console NF
    style: Italic

#######################################
##      START OF COLOR SCHEMES       ##
#######################################
schemes:
  ### Gruvbox dark ###
  gruvbox-dark: &gruvbox-dark
    # Default colors
    primary:
      # hard contrast: background = '0x1d2021'
      background: '#1b1b1b'
      # soft contrast: background = '0x32302f'
      foreground: '#ebdbb2'

    # Normal colors
    normal:
      black:   '#282828'
      red:     '#cc241d'
      green:   '#98971a'
      yellow:  '#d79921'
      blue:    '#458588'
      magenta: '#b16286'
      cyan:    '#689d6a'
      white:   '#a89984'

    # Bright colors
    bright:
      black:   '#928374'
      red:     '#fb4934'
      green:   '#b8bb26'
      yellow:  '#fabd2f'
      blue:    '#83a598'
      magenta: '#d3869b'
      cyan:    '#8ec07c'
      white:   '#ebdbb2'

  ### Monokai ###
  monokai-pro: &monokai-pro
    # Default colors
    primary:
      background: '#2D2A2E'
      foreground: '#FCFCFA'

    # Normal colors
    normal:
      black:   '#403E41'
      red:     '#FF6188'
      green:   '#A9DC76'
      yellow:  '#FFD866'
      blue:    '#FC9867'
      magenta: '#AB9DF2'
      cyan:    '#78DCE8'
      white:   '#FCFCFA'

    # Bright colors
    bright:
      black:   '#727072'
      red:     '#FF6188'
      green:   '#A9DC76'
      yellow:  '#FFD866'
      blue:    '#FC9867'
      magenta: '#AB9DF2'
      cyan:    '#78DCE8'
      white:   '#FCFCFA'

  ### Nord ###
  nord: &nord
    # Default colors
    primary:
      background: '#2E3440'
      foreground: '#D8DEE9'

    # Normal colors
    normal:
      black:   '#3B4252'
      red:     '#BF616A'
      green:   '#A3BE8C'
      yellow:  '#EBCB8B'
      blue:    '#81A1C1'
      magenta: '#B48EAD'
      cyan:    '#88C0D0'
      white:   '#E5E9F0'

    # Bright colors
    bright:
      black:   '#4C566A'
      red:     '#BF616A'
      green:   '#A3BE8C'
      yellow:  '#EBCB8B'
      blue:    '#81A1C1'
      magenta: '#B48EAD'
      cyan:    '#8FBCBB'
      white:   '#ECEFF4'

  ### nordic ###
  nordic: &nordic
     # Default colors
    primary:
      background: '#242933'
      foreground: '#BBBDAF'

    # Colors the cursor will use if `custom_cursor_colors` is true
    cursor:
      text: '#000000'
      cursor: '#F0DFAF'

    # Normal colors
    normal:
      black: '#191C1D'
      red: '#BD6062'
      green: '#A3D6A9'
      yellow: '#F0DFAF'
      blue: '#8FB4D8'
      magenta: '#C7A9D9'
      cyan: '#B6D7A8'

    # Bright colors
    bright:
      black: '#727C7C'
      red: '#D18FAF'
      green: '#B7CEB0'
      yellow: '#BCBCBC'
      blue: '#E0CF9F'
      magenta: '#C7A9D9'
      cyan: '#BBDA97'
      white: '#BDC5BD'
######################################################################
## SET THEME: Choose ONE color scheme from those in the above list. ##
## ###################################################################
# Available themes are:
# *dracula
# *gruvbox-dark
# *monokai-pro
# *nord
# *nordic

colors: *nordic

#######################################
##       END OF COLOR SCHEMES        ##
#######################################
key_bindings:
  - { key: C, mods: Command|Shift, chars: "\x02 " }
  # enter thumb mode
  - { key: S, mods: Command, chars: "\x02\"" }
  # split tmux window vertically
  - { key: S, mods: Command|Shift, chars: "\x02%" }
  # split tmux window horizontally
  - { key: F, mods: Command, chars: ":Grep\n" }
  # open file manager 'gokcehan/lf'
  - { key: F, mods: Command|Shift, chars: "\x02[/" }
  # start tmux search mode
  - { key: G, mods: Command, chars: "\x02g" }
  # open git manager 'jesseduffield/lazygit'
  - { key: G, mods: Command|Shift, chars: "\x02G" }
  # open github dash 'dlvhdr/gh-dash'
  - { key: J, mods: Command, chars: "\x02T" }
  # open t - tmux smart session manager
  - { key: K, mods: Command, chars: "\x02T" }
  # open t - tmux smart session manager
  - { key: L, mods: Command, chars: "\x02L" }
  # switch to the last tmux session
  - { key: O, mods: Command, chars: "\x02u" }
  # open URLs 'joshmedeski/tmux-fzf-url'
  - { key: P, mods: Command, chars: ":GoToFile\n" }
  # go to file
  - { key: P, mods: Command|Shift, chars: ":GoToCommand\n" }
  # run command
  - { key: Q, mods: Command, chars: ":q\n" }
  # quit vim
  - { key: S, mods: Command, chars: "\e:w\n" }
  # save vim buffer
  - { key: S, mods: Command|Shift, chars: "\e:wq\n" }
  # save vim buffer (and close)
  - { key: T, mods: Command, chars: "\x02c" }
  # create a new tmux window
  - { key: V, mods: Command|Shift, chars: "\x02]" }
  # paste last tmux buffer
  - { key: T, mods: Command|Shift, chars: "\x02P" }
  #                ... Toggle Pomodoro
  - { key: X, mods: Command, chars: "\x02x" }
  # kill the current pane
  - { key: Z, mods: Command, chars: "\x02z" }
  # toggle zoom state of the current tmux pane
  - { key: Tab, mods: Control, chars: "\x02n" }
  # switch to next tmux window
  - { key: Grave, mods: Control, chars: "\x02p" }
  # switch to previous tmux window
  - { key: Comma, mods: Command, chars: "\x02," }
  # rename the current tmux window
  - { key: Period, mods: Command, chars: ":ZenMode\n" }
  # toggle zen mode
  - { key: LBracket, mods: Command, chars: "\x0f" }
  # navigate back in vim (ctrl+o)
  - { key: LBracket, mods: Command|Shift, chars: "\x02p" }
  # switch to next tmux window
  - { key: RBracket, mods: Command, chars: "\t" }
  # navigate forward in vim (ctrl+i)
  - { key: RBracket, mods: Command|Shift, chars: "\x02n" }
  # switch to previous tmux window
  - { key: Semicolon, mods: Command, chars: "\x02:" }
  # enter the tmux command prompt
  - { key: Key1, mods: Command, chars: "\x021" }
  # select tmux window 1
  - { key: Key2, mods: Command, chars: "\x022" }
  #                ... 2
  - { key: Key3, mods: Command, chars: "\x023" }
  #                ... 3
  - { key: Key4, mods: Command, chars: "\x024" }
  #                ... 4
  - { key: Key5, mods: Command, chars: "\x025" }
  #                ... 5
  - { key: Key6, mods: Command, chars: "\x026" }
  #                ... 6
  - { key: Key7, mods: Command, chars: "\x027" }
  #                ... 7
  - { key: Key8, mods: Command, chars: "\x028" }
  #                ... 8
  - { key: Key9, mods: Command, chars: "\x029" }
